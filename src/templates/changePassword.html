<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinicao de senha</title>
    <style>
        body{
            background-color: white;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container{
            text-align: center;
            padding: 32px 20px;
        }
        .action-link{
            display: inline-block;
            margin: 18px 0;
            padding: 14px 18px;
            background-color: #224b72;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
        .footer{
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid #dddddd;
            color: #556270;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Recuperacao de senha</h2>
        <p>Ola,</p>
        <p>Recebemos uma solicitacao para redefinir a senha da sua conta. Se voce nao fez esse pedido, ignore este email.</p>
        <p>Para escolher uma nova senha, clique no link abaixo:</p>

        <a class="action-link" href="{{resetLink}}">Redefinir minha senha</a>

        
        <div class="footer">
            <p>Se voce tiver algum problema, consulte o suporte.</p>
        </div>
    </div>
    
</body>
</html>
